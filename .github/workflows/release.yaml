name: Release
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Read version
        id: ver
        run: echo "v=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Fail if tag already exists
        run: |
          if git ls-remote --tags origin "${{ steps.ver.outputs.v }}" | grep -q .; then
            echo "tag ${{ steps.ver.outputs.v }} already exists — bump package.json"
            exit 1
          fi
      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.v }}" \
            --title "${{ steps.ver.outputs.v }}" \
            --generate-notes \
            --target "$GITHUB_SHA"
      - run: npm publish --provenance --access public
